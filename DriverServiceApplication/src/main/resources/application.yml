# Driver Service Configuration
server:
  port: 8084

spring:
  application:
    name: driver-service
  main:
    lazy-initialization: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8762/eureka
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework.web: DEBUG